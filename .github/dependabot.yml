# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # JS dependencies (bun.lock). NOTE: GitHub added native "bun" ecosystem
  # support in 2024 - if Dependabot doesn't pick this up correctly, fall
  # back to package-ecosystem "npm" (bun.lock is npm-compatible for the
  # purposes of version resolution, just not for the lockfile format).
  - package-ecosystem: "bun"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      nuxt:
        patterns:
          - "@nuxt/*"
          - "nuxt"
        update-types: ["minor", "patch"]
      vue:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "@vueuse/*"
        update-types: ["minor", "patch"]
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
        update-types: ["minor", "patch"]
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@nuxt/test-utils"
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
